media:
  input: public/blog-assets
  output: /blog-assets

content:
  - name: posts
    label: 博客文章
    path: src/data/blog
    type: collection
    format: yaml-frontmatter
    exclude:
      - _post-template.md
    filename: "{year}-{month}-{day}-{primary}.md"
    view:
      fields:
        - title
        - pubDatetime
        - draft
        - tags
      primary: title
      sort: pubDatetime
      order: desc
    fields:
      - name: title
        label: 标题
        type: string
        required: true
      - name: description
        label: 摘要
        type: text
        required: true
      - name: pubDatetime
        label: 发布时间
        type: date
        options:
          time: true
          format: yyyy-MM-dd'T'HH:mm:ss'+08:00'
        required: true
      - name: draft
        label: 草稿
        type: boolean
        default: true
      - name: featured
        label: 精选文章
        type: boolean
        default: false
      - name: tags
        label: 标签
        type: string
        list: true
        default:
          - 随笔
      - name: author
        label: 作者
        type: string
        default: Dai Huiao
      - name: body
        label: 正文
        type: rich-text
        required: true
